# Apache template: route API traffic to two local Nest instances for rolling deploys.
#
# Prereqs:
#   sudo a2enmod proxy proxy_http proxy_balancer lbmethod_byrequests headers slotmem_shm
#   sudo a2enconf eyefi-nest-api-balancer
#   sudo systemctl reload apache2

<Proxy "balancer://eyefi_nest_api">
    # retry=1 avoids Apache keeping a restarted worker in error state for ~60s.
    # Shorter connection/response timeouts make failover faster during restarts.
    BalancerMember "http://127.0.0.1:3002" route=a retry=1 connectiontimeout=2 timeout=30
    BalancerMember "http://127.0.0.1:3003" route=b retry=1 connectiontimeout=2 timeout=30
    ProxySet lbmethod=byrequests
</Proxy>

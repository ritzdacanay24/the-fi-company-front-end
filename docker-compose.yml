services:
  nest-api:
    build:
      context: ./backend/nest-api
      dockerfile: Dockerfile
    container_name: eyefi-nest-api
    command: "${NEST_API_COMMAND:-npm start}"
    ports:
      - "3002:3000"
    environment:
      PORT: ${NEST_API_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-false}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-800}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-eyefidb}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      QAD_DSN: ${QAD_DSN}
      QAD_USER: ${QAD_USER}
      QAD_PASSWORD: ${QAD_PASSWORD}
      ODBCINI: ${ODBCINI:-/opt1/Progress/DataDirect/Connect64_for_ODBC_71/odbc.ini}
      ODBCINST: ${ODBCINST:-/opt1/Progress/DataDirect/Connect64_for_ODBC_71/odbcinst.ini}
      LD_LIBRARY_PATH: ${LD_LIBRARY_PATH:-/opt1/Progress/DataDirect/Connect64_for_ODBC_71/lib}
    volumes:
      - ./backend/nest-api/src:/app/src
      - ./backend/nest-api/tsconfig.json:/app/tsconfig.json:ro
      - ${QAD_DRIVER_PATH:-./backend/qad-driver/Connect64_for_ODBC_71}:/opt1/Progress/DataDirect/Connect64_for_ODBC_71:ro

  # php service disabled - Dockerfile not yet created
  # php:
  #   build:
  #     context: .
  #     dockerfile: backend/docker/php/Dockerfile
  #   container_name: eyefi-php
  #   ports:
  #     - "8080:80"

  mysql:
    image: mysql:8.0
    container_name: eyefi-mysql
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: eyefidb
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

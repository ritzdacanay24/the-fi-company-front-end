services:
  nest-api:
    build:
      context: ./backend/nest-api
      dockerfile: ${NEST_API_DOCKERFILE:-Dockerfile.dev}
    container_name: eyefi-nest-api
    command: ${NEST_API_COMMAND:-npm run dev}
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.development}
    ports:
      - "3002:3000"
    environment:
      PORT: ${NEST_API_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-800}
      ODBCINI: /opt1/Progress/DataDirect/Connect64_for_ODBC_71/odbc.ini
      ODBCINST: /opt1/Progress/DataDirect/Connect64_for_ODBC_71/odbcinst.ini
      LD_LIBRARY_PATH: /opt1/Progress/DataDirect/Connect64_for_ODBC_71/lib
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/nest-api/src:/app/src
      - ./backend/nest-api/tsconfig.json:/app/tsconfig.json:ro
      - ./backend/qad-driver/Connect64_for_ODBC_71:/opt1/Progress/DataDirect/Connect64_for_ODBC_71:ro

  mysql:
    image: mysql:8.0
    container_name: eyefi-mysql
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.development}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql

  mailpit:
    image: axllent/mailpit:latest
    container_name: eyefi-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data:

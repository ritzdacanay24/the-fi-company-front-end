services:
  qad-api:
    build:
      context: ./backend/qad-api
      dockerfile: Dockerfile
    container_name: eyefi-qad-api
    command: ${QAD_API_COMMAND:-npm start}
    ports:
      - "3001:3000"
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-false}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-800}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-eyefidb}
      DB_USER: ${DB_USER:-change_me}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      QAD_DSN: ${QAD_DSN:-DEV}
      QAD_USER: ${QAD_USER:-change_me}
      QAD_PASSWORD: ${QAD_PASSWORD:-change_me}
      ODBCINI: ${ODBCINI:-/opt1/Progress/DataDirect/Connect64_for_ODBC_71/odbc.ini}
      ODBCINST: ${ODBCINST:-/opt1/Progress/DataDirect/Connect64_for_ODBC_71/odbcinst.ini}
      LD_LIBRARY_PATH: ${LD_LIBRARY_PATH:-/opt1/Progress/DataDirect/Connect64_for_ODBC_71/lib}
    volumes:
      - ./backend/qad-api/src:/app/src
      - ./backend/qad-api/tsconfig.json:/app/tsconfig.json:ro
      - ${QAD_DRIVER_PATH:-./backend/qad-driver/Connect64_for_ODBC_71}:/opt1/Progress/DataDirect/Connect64_for_ODBC_71:ro

  php:
    build:
      context: .
      dockerfile: backend/docker/php/Dockerfile
    container_name: eyefi-php
    ports:
      - "8080:80"
    volumes:
      - ./backend/php:/var/www/html
      - ${QAD_DRIVER_PATH:-./backend/qad-driver/Connect64_for_ODBC_71}:/opt1/Progress/DataDirect/Connect64_for_ODBC_71:ro
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: eyefidb
      DB_USER: ${DB_USER:-change_me}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      QAD_DSN: ${QAD_DSN:-DEV}
      QAD_USER: ${QAD_USER:-change_me}
      QAD_PASSWORD: ${QAD_PASSWORD:-change_me}
      ODBCINI: /opt1/Progress/DataDirect/Connect64_for_ODBC_71/odbc.ini
      ODBCINST: /opt1/Progress/DataDirect/Connect64_for_ODBC_71/odbcinst.ini
      LD_LIBRARY_PATH: /opt1/Progress/DataDirect/Connect64_for_ODBC_71/lib
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -m >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mysql:
    image: mysql:8.0
    container_name: eyefi-mysql
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me}
      MYSQL_DATABASE: eyefidb
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

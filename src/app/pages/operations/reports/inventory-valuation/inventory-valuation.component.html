<div class="row">
  <div class="col-12 col-xl-12 stretch-card">
    <div class="card overflow-hidden" [ngClass]="{'fullscreen' : tableConfig.fullscreen}">

      <div class="card-header card-header-sm my-auto">
        <div class="valuation-toolbar">
          <div class="valuation-toolbar-left">
            <h5 class="valuation-title mb-0">Inventory Valuation</h5>

            <select class="form-control form-control-sm valuation-site-select"
              [(ngModel)]="sites"
              (ngModelChange)="getData()">
              <option *ngFor="let row of ['JX01', 'RMLV', 'FGLV', 'All']" [value]="row">{{row}}</option>
            </select>

            <div class="valuation-search-wrap">
              <input
                type="text"
                class="form-control form-control-sm"
                placeholder="Search part, customer, status..."
                [ngModel]="quickSearch"
                (ngModelChange)="onQuickSearchChange($event)">
              <button
                type="button"
                class="btn btn-sm btn-outline-secondary"
                (click)="clearQuickSearch()"
                [disabled]="!quickSearch">
                Clear
              </button>
            </div>
          </div>

          <div class="valuation-toolbar-right">
            <small class="text-muted" *ngIf="lastUpdate">Updated: {{ lastUpdate | date:'medium' }}</small>
          </div>
        </div>

        <div class="summary-cards">
          <div class="summary-card">
            <div class="summary-label">Total</div>
            <div class="summary-value">{{ formatCurrency(totalInventory) }}</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Inventory Turns >= 1</div>
            <div class="summary-value">{{ formatCurrency(greaterThanOne) }}</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Inventory Turns < 1</div>
            <div class="summary-value">{{ formatCurrency(lessThanOrEqualToOne) }}</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Other</div>
            <div class="summary-value">{{ formatCurrency(other) }}</div>
          </div>
        </div>
      </div>

      <ag-grid-angular
        (filterChanged)="onFilterChanged($event)"
        [gridOptions]="gridOptions"
        class="{{tableConfig.theme}} ag-full-md inventory-grid"
        [rowData]="data">
      </ag-grid-angular>
    </div>
  </div>
</div>

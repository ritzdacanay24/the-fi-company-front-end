<div id="layout-wrapper" class="ulg-shell" [class.sidebar-open]="isSidebarOpen">
  <header class="ulg-topbar d-flex align-items-center justify-content-between px-3 px-md-4">
    <div class="d-flex align-items-center gap-2">
      <button class="btn btn-outline-secondary ulg-sidebar-toggle" type="button" (click)="toggleSidebar()">
        <i class="las la-bars"></i>
      </button>
      <div class="ulg-logo-badge">ULG</div>
      <div>
        <h1 class="h6 mb-0">Unique Label Generator</h1>
        <small class="text-muted">Batch Creation, Reprint, and Sequence Tracking</small>
      </div>
    </div>
    <a class="btn btn-sm btn-outline-secondary" routerLink="/menu" target="_self">Back to Main Menu</a>
  </header>

  <nav class="ulg-section-rail" aria-label="Main Sections">
    <a
      *ngFor="let section of mainSections"
      class="ulg-rail-link"
      [routerLink]="section.route"
      [class.active]="isMainSectionActive(section.route)"
      [attr.title]="section.label"
    >
      <i [class]="section.icon"></i>
      <span class="visually-hidden">{{ section.label }}</span>
    </a>
  </nav>

  <app-standalone-sidenav
    prefix="ulg"
    [isOpen]="isSidebarOpen"
    brandRoute="/standalone/unique-label-generator/create"
    logoSm="ULG"
    logoLg="Unique Label"
    groupTitle="Unique Label Generator"
    [navItems]="navItems"
    (navItemClick)="onNavClick()"
  ></app-standalone-sidenav>

  <div class="ulg-sidebar-backdrop" *ngIf="isSidebarOpen && !isDesktopViewport" (click)="closeSidebar()"></div>

  <div class="main-content">
    <div class="page-content">
      <div class="container-fluid py-2 py-md-3">
        <nav aria-label="breadcrumb" class="mb-2">
          <ol class="breadcrumb breadcrumb-custom mb-0">
            <li class="breadcrumb-item">
              <a routerLink="/standalone/unique-label-generator/create">Unique Label Generator</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">{{ currentSectionLabel }}</li>
          </ol>
        </nav>

        <div class="module-title mb-3 d-flex align-items-center gap-3 py-1">
          <div class="module-title-icon rounded-circle d-inline-flex align-items-center justify-content-center">
            <i [class]="currentSection.icon"></i>
          </div>
          <div>
            <h2 class="h3 mb-1">{{ currentSection.label }}</h2>
            <p class="text-muted mb-0">{{ currentSection.subtitle }}</p>
          </div>
        </div>

        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>

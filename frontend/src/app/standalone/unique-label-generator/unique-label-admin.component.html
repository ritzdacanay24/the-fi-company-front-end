<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12">

      <!-- Page Header -->
      <div class="mb-4">
        <nav aria-label="breadcrumb" class="mb-2">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a routerLink="/serial-management">Serial Management</a></li>
            <li class="breadcrumb-item"><a routerLink="/serial-management/ul-generator">Unique Label Generator</a></li>
            <li class="breadcrumb-item active" aria-current="page">Admin</li>
          </ol>
        </nav>
        <div class="d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center">
            <div class="bg-primary bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center"
              style="width: 60px; height: 60px;">
              <i class="mdi mdi-shield-account-outline text-white fs-4"></i>
            </div>
            <div>
              <h2 class="mb-1 text-primary">Label Batch Admin</h2>
              <p class="text-muted mb-0">Manage batch lifecycle: archive, restore, and delete batches</p>
            </div>
          </div>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-header">
          <div class="d-flex align-items-center flex-wrap gap-3">
            <div class="form-icon" style="width: 280px;">
              <input type="search" class="form-control form-control-icon" [(ngModel)]="searchTerm" placeholder="Search batches...">
              <i class="mdi mdi-magnify"></i>
            </div>
            <select class="form-select" style="width: 160px;" [(ngModel)]="lifecycleStatus" (change)="loadBatches()">
              <option value="active">Active</option>
              <option value="archived">Archived</option>
              <option value="deleted">Deleted</option>
              <option value="all">All</option>
            </select>
            <button class="btn btn-outline-secondary" (click)="loadBatches()" [disabled]="isLoadingBatches">
              <i class="mdi mdi-refresh me-1"></i>Refresh
            </button>
          </div>
        </div>
  <div class="card-body p-0">
    <ag-grid-angular
      class="ag-theme-quartz no-border"
      style="width: 100%; height: calc(100vh - 311px); min-height: 420px;"
      [columnDefs]="batchColumnDefs"
      [defaultColDef]="defaultColDef"
      [rowData]="filteredBatches">
    </ag-grid-angular>
  </div>
</div>

    </div>
  </div>
</div>

<ng-template #editBatchModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title">Edit Batch {{ selectedBatchId }}</h5>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body">
    <form [formGroup]="editForm">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Source Type</label>
          <select class="form-select" [formControl]="editForm.controls.source_type">
            <option value="WO">WO</option>
            <option value="MANUAL">MANUAL</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Work Order #</label>
          <input class="form-control" [formControl]="editForm.controls.work_order_number" placeholder="Optional" />
        </div>
        <div class="col-md-4">
          <label class="form-label">Part Number</label>
          <input class="form-control" [formControl]="editForm.controls.part_number" />
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="saveBatchEdit()" [disabled]="isSavingEdit">
      {{ isSavingEdit ? 'Saving...' : 'Save Changes' }}
    </button>
  </div>
</ng-template>

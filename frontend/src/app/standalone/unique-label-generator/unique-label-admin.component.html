<div class="card border-0 shadow-sm">
  <div class="card-header bg-white d-flex justify-content-between align-items-center gap-2 flex-wrap">
    <h3 class="h6 mb-0">Batch Lifecycle Management</h3>
    <div class="d-flex align-items-center gap-2 flex-wrap">
      <input class="form-control" style="width: 160px;" type="text" [(ngModel)]="actorName" placeholder="Actor name" />
      <input class="form-control" style="width: 240px;" type="text" [(ngModel)]="searchTerm" placeholder="Search batches..." />
      <select class="form-select" style="width: 160px;" [(ngModel)]="lifecycleStatus" (change)="loadBatches()">
        <option value="active">Active</option>
        <option value="archived">Archived</option>
        <option value="deleted">Deleted</option>
        <option value="all">All</option>
      </select>
      <button class="btn btn-outline-secondary" (click)="loadBatches()" [disabled]="isLoadingBatches">Refresh</button>
    </div>
  </div>
  <div class="card-body">
    <ag-grid-angular
      class="ag-theme-quartz no-border"
      style="width: 100%; height: calc(100vh - 280px); min-height: 420px;"
      [columnDefs]="batchColumnDefs"
      [defaultColDef]="defaultColDef"
      [rowData]="filteredBatches">
    </ag-grid-angular>
  </div>
</div>

<ng-template #editBatchModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title">Edit Batch {{ selectedBatchId }}</h5>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body">
    <form [formGroup]="editForm">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Source Type</label>
          <select class="form-select" [formControl]="editForm.controls.source_type">
            <option value="WO">WO</option>
            <option value="MANUAL">MANUAL</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Work Order #</label>
          <input class="form-control" [formControl]="editForm.controls.work_order_number" placeholder="Optional" />
        </div>
        <div class="col-md-4">
          <label class="form-label">Part Number</label>
          <input class="form-control" [formControl]="editForm.controls.part_number" />
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="saveBatchEdit()" [disabled]="isSavingEdit">
      {{ isSavingEdit ? 'Saving...' : 'Save Changes' }}
    </button>
  </div>
</ng-template>

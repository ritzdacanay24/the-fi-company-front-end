<div class="container py-4 unique-label-page">

  <div class="card border-0 shadow-sm mb-3">
    <div class="card-header bg-white">
      <h2 class="h5 mb-0">Create Batch</h2>
    </div>
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="generateBatch()">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Source Type</label>
            <select class="form-select" formControlName="source_type">
              <option *ngFor="let item of sourceTypes" [value]="item.value">{{ item.label }}</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Created By</label>
            <input
              class="form-control"
              type="text"
              formControlName="created_by_name"
              placeholder="Your name"
              [readonly]="isAuthenticatedCreator"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Work Order #</label>
            <div class="input-group">
              <input
                class="form-control"
                type="text"
                formControlName="work_order_number"
                placeholder="Scan or enter WO"
                [disabled]="!isWorkOrderMode"
              />
              <button class="btn btn-outline-primary" type="button" (click)="lookupWorkOrder()" [disabled]="!isWorkOrderMode || isLoadingWo">
                {{ isLoadingWo ? 'Loading...' : 'Lookup' }}
              </button>
            </div>
          </div>

          <div class="col-md-3">
            <label class="form-label">Part Number</label>
            <input class="form-control" type="text" formControlName="part_number" placeholder="Part number" />
          </div>

          <div class="col-md-3">
            <label class="form-label">Quantity</label>
            <input class="form-control" type="number" formControlName="quantity" min="1" max="200" />
          </div>
        </div>

        <div class="d-flex justify-content-end mt-3">
          <button class="btn btn-success" type="submit" [disabled]="isGenerating">
            {{ isGenerating ? 'Generating...' : 'Generate Labels' }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="card border-0 shadow-sm mb-3" *ngIf="generatedIdentifiers.length > 0">
    <div class="card-header bg-white d-flex justify-content-between align-items-center gap-2">
      <h2 class="h5 mb-0">Generated Labels (Batch {{ generatedBatchId }})</h2>
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-outline-secondary btn-sm" type="button" (click)="printGenerated()">Print View</button>
        <button class="btn btn-outline-primary btn-sm" type="button" (click)="printGeneratedZpl()">Print Zebra</button>
      </div>
    </div>
    <div class="card-body">
      <ag-grid-angular
        class="ag-theme-quartz no-border"
        style="width: 100%; height: calc(100vh - 420px); min-height: 260px;"
        [columnDefs]="generatedColumnDefs"
        [defaultColDef]="generatedDefaultColDef"
        [rowData]="generatedIdentifiers">
      </ag-grid-angular>
    </div>
  </div>

</div>

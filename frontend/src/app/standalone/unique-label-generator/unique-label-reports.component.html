<div class="card border-0 shadow-sm mb-3">
  <div class="card-header bg-white d-flex justify-content-between align-items-center gap-2">
    <h3 class="h6 mb-0">Reports</h3>
    <div class="d-flex align-items-center gap-2">
      <label class="small text-muted mb-0">Days</label>
      <input class="form-control form-control-sm" style="width: 90px;" type="number" [(ngModel)]="days" min="1" max="365" />
      <button class="btn btn-sm btn-outline-primary" (click)="loadReport()" [disabled]="isLoading">Refresh</button>
    </div>
  </div>
  <div class="card-body" *ngIf="totals">
    <div class="row g-2">
      <div class="col-md-3"><div class="border rounded p-2"><small class="text-muted">Total Batches</small><div class="h5 mb-0">{{ totals.total_batches ?? 0 }}</div></div></div>
      <div class="col-md-3"><div class="border rounded p-2"><small class="text-muted">Total Labels</small><div class="h5 mb-0">{{ totals.total_labels ?? 0 }}</div></div></div>
      <div class="col-md-3"><div class="border rounded p-2"><small class="text-muted">WO Batches</small><div class="h5 mb-0">{{ totals.wo_batches ?? 0 }}</div></div></div>
      <div class="col-md-3"><div class="border rounded p-2"><small class="text-muted">Manual Batches</small><div class="h5 mb-0">{{ totals.manual_batches ?? 0 }}</div></div></div>
    </div>
  </div>
</div>

<div class="row g-3">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white"><h4 class="h6 mb-0">Top Parts</h4></div>
      <div class="card-body">
        <ag-grid-angular
          class="ag-theme-quartz no-border"
          style="width: 100%; height: calc(100vh - 520px); min-height: 260px;"
          [columnDefs]="topPartsColumnDefs"
          [defaultColDef]="defaultColDef"
          [rowData]="topParts">
        </ag-grid-angular>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white"><h4 class="h6 mb-0">Weekly Sequence Utilization</h4></div>
      <div class="card-body border-bottom" *ngIf="weekUsage.length > 0">
        <apx-chart
          [series]="sequenceUtilizationChart.series"
          [chart]="sequenceUtilizationChart.chart"
          [xaxis]="sequenceUtilizationChart.xaxis"
          [yaxis]="sequenceUtilizationChart.yaxis"
          [stroke]="sequenceUtilizationChart.stroke"
          [dataLabels]="sequenceUtilizationChart.dataLabels"
          [tooltip]="sequenceUtilizationChart.tooltip"
          [legend]="sequenceUtilizationChart.legend"
          [grid]="sequenceUtilizationChart.grid"
          [markers]="sequenceUtilizationChart.markers"
          [colors]="sequenceUtilizationChart.colors"
        ></apx-chart>
      </div>
      <div class="card-body">
        <ag-grid-angular
          class="ag-theme-quartz no-border"
          style="width: 100%; height: calc(100vh - 520px); min-height: 260px;"
          [columnDefs]="weekUsageColumnDefs"
          [defaultColDef]="defaultColDef"
          [rowData]="weekUsage">
        </ag-grid-angular>
      </div>
    </div>
  </div>
</div>

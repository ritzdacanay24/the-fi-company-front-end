<div class="workflow-hub container-fluid">
  <div class="hero card border-0 shadow-sm mb-3">
    <div class="card-body p-4 p-md-5">
      <h2 class="mb-2 fw-bold text-primary">
        <i class="mdi mdi-clipboard-check-outline me-2"></i>Standalone Quality Inspection
      </h2>
      <p class="text-muted mb-0">
        End-to-end photo checklist execution and management outside the Operations navigation.
      </p>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-12 col-md-6 col-xl-4" *ngFor="let section of sections">
      <div class="card h-100 border-0 shadow-sm workflow-card">
        <div class="card-body d-flex flex-column">
          <div class="d-flex align-items-center gap-2 mb-2">
            <span class="badge rounded-pill text-bg-light border icon-pill">
              <i class="mdi {{ section.icon }}"></i>
            </span>
            <h5 class="mb-0 fw-semibold">{{ section.title }}</h5>
          </div>

          <p class="text-muted small flex-grow-1 mb-3">{{ section.description }}</p>

          <a class="btn btn-outline-{{ section.tone }}" [routerLink]="[section.link]">
            {{ section.button }}
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg position-fixed w-100" [class.navbar-transparent]="transparent" style="top: 0; z-index: 1055; height: 56px;">
  <div class="container-fluid h-100">
    <!-- Brand with Logo Only -->
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img
        src="assets/images/the-fi-cropped.png"
        alt="The Fi Company"
        class="fi-header-logo">
    </a>
    
    <!-- Mobile Toggle Button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <!-- Collapsible Content -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <!-- Menu Button (Hidden on menu pages) -->
        <li class="nav-item" *ngIf="!isMenuRoute">
          <button class="btn btn-outline-light btn-sm ms-2" (click)="onMenu()">
            <i class="mdi mdi-view-dashboard me-1"></i>Menu
          </button>
        </li>
      </ul>
      
      <!-- Authenticated User Section -->
      <div *ngIf="resolvedIsAuthenticated" class="d-flex align-items-center">
        <!-- User Avatar -->
        <div class="user-avatar me-3">
          <div class="avatar-container position-relative" style="width: 40px; height: 40px;">
            <!-- User Image -->
            <img 
                *ngIf="resolvedHasValidUserImage"
                [src]="getUserImageUrl()" 
                [alt]="resolvedUser?.full_name || 'User'"
                class="user-avatar-img"
                (error)="onUserImageError($event)"
                style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(68, 114, 177, 0.3);">
            <!-- Fallback initials -->
            <div 
                *ngIf="!resolvedHasValidUserImage"
                class="avatar-fallback d-flex align-items-center justify-content-center" 
                style="width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 255, 255, 0.96); border: 2px solid rgba(255, 255, 255, 0.75);">
              <span class="fw-bold" style="font-size: 12px; color: #123a73; letter-spacing: 0.2px;">{{ getUserInitials() }}</span>
            </div>
          </div>
        </div>
        
        <!-- Session Info -->
        <div class="session-info me-3">
          <div class="fw-semibold small text-white">{{ resolvedUser?.full_name || resolvedUser?.username || 'User' }}</div>
          <div class="small opacity-75 d-none d-sm-block text-white" *ngIf="sessionTimeRemaining || inactivityTimeRemaining">
            <i class="mdi mdi-timer me-1"></i>{{ sessionTimeRemaining }}
            <span class="mx-1">|</span>
            <i class="mdi mdi-account-clock me-1"></i>{{ inactivityTimeRemaining }}
          </div>
          <!-- Mobile version - show only session time -->
          <div class="small opacity-75 d-block d-sm-none text-white" *ngIf="sessionTimeRemaining">
            <i class="mdi mdi-timer me-1"></i>{{ sessionTimeRemaining }}
          </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="btn-group">
          <button class="btn btn-outline-light btn-sm" (click)="onLogout()">
            <i class="mdi mdi-logout me-1"></i>
            <span class="d-none d-lg-inline">Logout</span>
          </button>
        </div>
      </div>

      <!-- Unauthenticated User Section -->
      <div *ngIf="!resolvedIsAuthenticated && !isLoginRoute" class="d-flex align-items-center">
        <button class="btn btn-outline-light btn-sm" (click)="onLogin()">
          <i class="mdi mdi-login me-1"></i>
          <span class="d-none d-sm-inline">Login</span>
        </button>
      </div>

    </div>
  </div>
</nav>

<!-- Page Header Section -->

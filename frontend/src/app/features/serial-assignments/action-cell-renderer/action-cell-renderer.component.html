<!-- Don't show actions for group rows -->
<ng-container *ngIf="params.data">
  <span class="text-muted small" *ngIf="!isNewSystem">Legacy - N/A</span>

  <div class="btn-group" ngbDropdown container="body" *ngIf="isNewSystem && isVoided">
  <button type="button" class="btn btn-sm btn-secondary" ngbDropdownToggle>
    <i class="mdi mdi-dots-vertical"></i>
  </button>
  <div ngbDropdownMenu class="dropdown-menu-end">
    <button ngbDropdownItem (click)="onRestore()">
      <i class="mdi mdi-restore me-2"></i>Restore Assignment
    </button>
  </div>
</div>

<div class="btn-group" ngbDropdown container="body" *ngIf="isNewSystem && !isVoided">
  <button type="button" class="btn btn-sm btn-secondary" ngbDropdownToggle>
    <i class="mdi mdi-dots-vertical"></i>
  </button>
  <div ngbDropdownMenu class="dropdown-menu-end">
    <button ngbDropdownItem (click)="onPrint()">
      <i class="mdi mdi-printer me-2"></i>Print Report
    </button>
    <div class="dropdown-divider" *ngIf="canManage"></div>
    <button ngbDropdownItem (click)="onReassign()" *ngIf="canManage">
      <i class="mdi mdi-swap-horizontal me-2"></i>Reassign Work Order
    </button>
    <button ngbDropdownItem (click)="onVoid()" *ngIf="canManage">
      <i class="mdi mdi-cancel me-2"></i>Void Assignment
    </button>
    <button ngbDropdownItem disabled class="text-muted" *ngIf="canManage">
      <i class="mdi mdi-delete-off me-2"></i>Delete Disabled (Use Void/Reassign)
    </button>
    <div class="dropdown-item-text small text-muted" *ngIf="canManage">
      Permanent delete is disabled for safety.
    </div>
    <ng-container *ngIf="requiresVerif && verificationStatus !== 'verified'">
      <div class="dropdown-divider"></div>
      <button ngbDropdownItem disabled class="text-muted">
        <i class="mdi {{ verifyIcon }} me-2"></i>{{ verifyText }} Serial (Disabled)
      </button>
    </ng-container>
  </div>
</div>
</ng-container>

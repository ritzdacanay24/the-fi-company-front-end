<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12">
      <div class="d-none d-lg-block">
        <app-breadcrumb [items]="breadcrumbItems()"></app-breadcrumb>
      </div>

      <div class="mb-4">
        <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
          <div class="d-flex align-items-center flex-grow-1" style="min-width: 0;">
            <div class="bg-primary bg-gradient rounded-circle me-3 d-none d-md-flex align-items-center justify-content-center analytics-icon">
              <i class="mdi mdi-chart-box text-white fs-4"></i>
            </div>
            <div class="flex-grow-1" style="min-width: 0;">
              <h2 class="mb-1 text-primary app-page-title">Support Analytics</h2>
              <p class="text-muted mb-0 app-page-subtitle">Manager and supervisor view of support errors, ownership, and timing trends.</p>
            </div>
          </div>
        </div>

        <div class="card mb-3 filter-card">
          <div class="card-body d-flex align-items-center flex-wrap gap-2">
            <div class="form-icon">
              <input
                type="search"
                class="form-control form-control-icon analytics-search"
                [ngModel]="searchTerm()"
                (ngModelChange)="searchTerm.set($event); onSearchChange()"
                placeholder="Search tickets..." />
              <i class="mdi mdi-magnify"></i>
            </div>

            <select class="form-select analytics-select" [ngModel]="selectedStatus()" (ngModelChange)="selectedStatus.set($event); onFilterChange()">
              @for (option of statusFilterOptions; track option.value) {
                <option [value]="option.value">{{ option.label }}</option>
              }
            </select>

            <select class="form-select analytics-select" [ngModel]="selectedType()" (ngModelChange)="selectedType.set($event); onFilterChange()">
              @for (option of typeFilterOptions; track option.value) {
                <option [value]="option.value">{{ option.label }}</option>
              }
            </select>

            <select class="form-select analytics-select" [ngModel]="selectedPriority()" (ngModelChange)="selectedPriority.set($event); onFilterChange()">
              @for (option of priorityFilterOptions; track option.value) {
                <option [value]="option.value">{{ option.label }}</option>
              }
            </select>

            <button class="btn btn-outline-secondary" (click)="clearFilters()">
              <i class="mdi mdi-filter-remove-outline me-1"></i>
              Reset
            </button>
          </div>
        </div>
      </div>

      @if (isLoading()) {
        <div class="card">
          <div class="card-body text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="text-muted mt-3 mb-0">Loading analytics...</p>
          </div>
        </div>
      } @else {
        <app-support-tickets-insights [tickets]="tickets()"></app-support-tickets-insights>
      }
    </div>
  </div>
</div>

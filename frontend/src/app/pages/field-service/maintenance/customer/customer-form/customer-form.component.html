<form [formGroup]="form" autocomplete="off">

  <div class="mb-3">
    <label class="form-label">Name</label>
    <input type="text" class="form-control" formControlName="name" placeholder="Enter name"
      [ngClass]="{ 'is-invalid': submitted && f['name'].errors }" />
  </div>

  <div class="mb-3">
    <label class="form-label">Image Url</label>
    <textarea class="form-control" formControlName="image" placeholder="Enter image url" rows="4"></textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Color</label>
    <input type="text" class="form-control" formControlName="background_color" placeholder="Enter color" />
  </div>

  <div class="mb-3">
    <label class="form-label">Notification Emails</label>
    <div class="input-group mb-3">
      <input
        type="text"
        class="form-control"
        placeholder="Enter email and click Add"
        [(ngModel)]="emailDraft"
        [ngModelOptions]="{ standalone: true }"
        (keydown.enter)="addEmail()"
      />
      <button class="btn btn-outline-primary" type="button" (click)="addEmail()">Add</button>
    </div>

    <div #emailTableWrap class="table-responsive email-table-wrap" *ngIf="recipients.length > 0">
      <table class="table table-sm table-bordered align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th style="width:50px">#</th>
            <th>Email</th>
            <th style="width:90px">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of recipients; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ r.email }}</td>
            <td>
              <button type="button" class="btn btn-sm btn-danger" (click)="removeEmail(i)">Remove</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div *ngIf="recipients.length === 0" class="email-empty-state text-muted">No notification emails added yet.</div>

    <div class="form-text">Used for Field Service distribution emails.</div>
  </div>

  <div class="mb-3">
    <div class="form-check form-switch form-switch-md">
      <input class="form-check-input" type="checkbox" id="active" formControlName="active"
        (change)="setBooleanToNumber('active')">
      <label class="form-check-label" for="active">Active</label>
    </div>
  </div>

</form>

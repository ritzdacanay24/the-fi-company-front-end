<div class="card border-0">
  <div class="card-header bg-light border-bottom">
    <h5 class="mb-1">File Attachments</h5>
    <p class="text-muted mb-0">Manage and view uploaded files and documents</p>
  </div>

  <div class="card-body">
    <app-feature-attachments-panel
      [feature]="FeatureType.FIELD_SERVICE_TICKET"
      [resourceId]="workOrderId"
      [legacyFieldNames]="legacyFieldNames"
      [disabled]="disabled"
      [viewMode]="'table'"
      [showDelete]="!disabled">
    </app-feature-attachments-panel>
  </div>
</div>

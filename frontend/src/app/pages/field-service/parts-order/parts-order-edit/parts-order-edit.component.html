<div class="container-fluid" *ngIf="!data && !id">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-9 col-xl-8 col-xxl-7">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          Please select a record from the list.
        </div>
        <div class="card-footer bg-light border-top p-3">
          <button class="btn btn-outline-secondary" [disabled]="isLoading" (click)="onCancel()">Go to list</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid" [hidden]="!data && !id">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-9 col-xl-8 col-xxl-7">

      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a routerLink="/field-service">Field Service</a></li>
          <li class="breadcrumb-item"><a routerLink="/operations/parts-order/list">Parts Orders</a></li>
          <li class="breadcrumb-item active" aria-current="page">{{title}}</li>
        </ol>
      </nav>

      <div class="mb-4">
        <div class="d-flex align-items-center mb-3">
          <button type="button" class="btn btn-outline-secondary me-3" (click)="goBack()" *ngIf="goBack" title="Back to Parts Order List">
            <i class="mdi mdi-arrow-left me-2"></i>Back
          </button>
          <div>
            <h2 class="mb-1">Parts Order {{title}}</h2>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-header bg-light border-0 d-flex align-items-center justify-content-between" *ngIf="data && id">
          <h5 class="mb-0">Parts Order Details</h5>
          <div ngbDropdown placement="bottom-end" container="body" *ngIf="isAdmin || canManage">
            <button type="button" class="btn btn-light border btn-sm d-inline-flex align-items-center" ngbDropdownToggle>
              <i class="mdi mdi-tune-vertical me-2"></i>
              <span class="lh-1">Select action</span>
            </button>
            <div ngbDropdownMenu>
              <button ngbDropdownItem class="text-warning" (click)="onArchive()" *ngIf="canManage">
                <i class="mdi mdi-archive-outline me-2"></i>Archive
              </button>
              <div class="dropdown-divider" *ngIf="canManage && isAdmin"></div>
              <button ngbDropdownItem class="text-danger" (click)="onDelete()" *ngIf="isAdmin">
                <i class="mdi mdi-delete-outline me-2"></i>Delete
              </button>
            </div>
          </div>
        </div>
        <div class="card-body p-4">

          <app-parts-order-form (setFormEmitter)="onFormReady($event)" [submitted]="submitted" [id]="id" [details]="details"></app-parts-order-form>

          <div class="mt-4 pt-4 border-top">
            <h5 class="mb-3">Attachments</h5>
            <app-uploaded-attachments-list
              [attachments]="attachments"
              [viewMode]="'table'"
              [showThumbnails]="true"
              [showDelete]="true"
              [disableDelete]="isLoading"
              [showHelperText]="true"
              [helperText]="'Click on filenames to preview, or use direct download links if preview fails.'"
              [useSharedViewer]="true"
              (deleteRequested)="deleteAttachment($event.id, $event.index)">
            </app-uploaded-attachments-list>

            <label class="form-label">Upload Documents</label>
            <div class="mb-3">
              <app-upload-new-attachments
                [files]="myFiles"
                [disabled]="isLoading"
                [pendingViewMode]="'table'"
                [accept]="'*/*'"
                [multiple]="true"
                [allowPaste]="true"
                [openPickerOnContainerClick]="true"
                [chooseLabel]="'Choose files'"
                [dropLabel]="'or drag them here.'"
                [uploadTriggerMode]="uploadTriggerMode"
                [helperText]="'Files upload automatically after you add them.'"
                (filesAdded)="onAttachmentFilesAdded($event)"
                (removeRequested)="removeFile($event)"
                (uploadRequested)="onUploadAttachments()">
              </app-upload-new-attachments>
            </div>

            <div class="d-flex justify-content-end" *ngIf="uploadTriggerMode === 'manual'">
              <button (click)="this.onUploadAttachments()" type="button" class="btn btn-primary text-nowrap"
                [disabled]="isLoading || myFiles?.length == 0">
                <i class="feather icon-upload me-1"></i>Upload
              </button>
            </div>
          </div>

        </div>

        <div class="card-footer bg-light border-top d-flex justify-content-between p-3" *ngIf="data && id">
          <button class="btn btn-outline-secondary" [disabled]="isLoading" (click)="onCancel()">Cancel</button>
          <button class="btn btn-primary" [disabled]="isLoading" (click)="onSubmit()">Update</button>
        </div>
      </div>

    </div>
  </div>
</div>

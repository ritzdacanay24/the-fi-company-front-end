<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-12">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a routerLink="/dashboard/operations">Operations</a></li>
                    <li class="breadcrumb-item"><a routerLink="/operations/parts-order/list">Parts Requests</a></li>
                    <li class="breadcrumb-item active" aria-current="page">{{ title }}</li>
                </ol>
            </nav>

            <div class="mb-4">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <div class="d-flex align-items-center">
                        <div class="bg-primary bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center"
                            style="width: 60px; height: 60px;">
                            <i class="mdi mdi-tools text-white fs-4"></i>
                        </div>
                        <div>
                            <h2 class="mb-1 text-primary">{{ title }}</h2>
                            <p class="text-muted mb-0">Manage field service parts orders, tracking, and due dates</p>
                        </div>
                    </div>

                    <button type="button" class="btn btn-primary" routerLink="/operations/parts-order/create">
                        <i class="mdi mdi-plus me-1"></i>Create
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="d-flex align-items-center">
                        <div>
                            <div class="form-icon">
                                <input type="search" class="form-control form-control-icon" style="width:300px"
                                    (ngModelChange)="this.gridApi?.setGridOption('quickFilterText', $event)" [(ngModel)]="searchName"
                                    placeholder="Search parts orders...">
                                <i class="ri-search-2-line"></i>
                            </div>
                        </div>

                        <div class="ms-3">
                            <app-grid-settings [gridApi]="gridApi" [pageId]="pageId"></app-grid-settings>
                        </div>
                    </div>
                </div>
                <div class="card-body p-0">
                    <ag-grid-angular [gridOptions]="gridOptions" class="ag-theme-quartz no-border"
                        style="height: calc(100vh - 297px);" [rowData]="data" [columnDefs]="columnDefs">
                    </ag-grid-angular>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-9 col-xl-8 col-xxl-7">

      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a routerLink="/field-service">Field Service</a></li>
          <li class="breadcrumb-item"><a routerLink="/operations/parts-order/list">Parts Orders</a></li>
          <li class="breadcrumb-item active" aria-current="page">Create</li>
        </ol>
      </nav>

      <div class="mb-4">
        <div class="d-flex align-items-center mb-3">
          <button type="button" class="btn btn-outline-secondary me-3" (click)="goBack()" *ngIf="goBack" title="Back to Parts Order List">
            <i class="mdi mdi-arrow-left me-2"></i>Back
          </button>
          <div>
            <h2 class="mb-1">{{title}}</h2>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <app-parts-order-form (setFormEmitter)="form = $event" [submitted]="submitted"></app-parts-order-form>

          <div class="mt-4 pt-4 border-top">
            <div class="mb-3">
              <h3 class="h5 mb-1">Attachments</h3>
              <p class="text-muted mb-0">Add files now. They will be uploaded automatically after creating the parts order.</p>
            </div>

            <app-inline-attachment-dropzone
              [disabled]="isLoading"
              (filesAdded)="onAttachmentFilesAdded($event)">
            </app-inline-attachment-dropzone>

            <div class="mt-3">
              <app-pending-attachments-list
                [files]="selectedFiles"
                [disabled]="isLoading"
                [helperText]="'Selected files are queued and will upload after creating the parts order.'"
                (removeRequested)="removeFile($event)">
              </app-pending-attachments-list>
            </div>
          </div>
        </div>

        <div class="card-footer bg-light border-top d-flex justify-content-between p-3">
          <button class="btn btn-outline-secondary" [disabled]="isLoading" (click)="onCancel()">Cancel</button>
          <button class="btn btn-primary" [disabled]="isLoading" (click)="onSubmit()">Submit</button>
        </div>
      </div>

    </div>
  </div>
</div>

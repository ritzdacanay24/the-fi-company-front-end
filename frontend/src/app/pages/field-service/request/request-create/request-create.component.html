<div class="row">
  <div class="content-grid col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-10 col-xxxl-12">
    <div class="card">
      <div class="card-header d-flex align-items-center">
        <button class="btn btn-light btn-sm shadow-none bg-light rounded border-0 me-2 me-auto" *ngIf="goBack"
          (click)="goBack()"><i class="mdi mdi-arrow-left pointer text-muted"></i> Back</button>
        <h4 class="card-title mb-0 flex-grow-1 text-end"> {{title}} </h4>
      </div>
      <div class="card-body" style="min-height:300px">
        <app-request-form (setFormEmitter)="setFormEmitter($event)" [submitted]="submitted"
          [showCaptcha]="showCaptcha"></app-request-form>

        <div class="mt-4 pt-4 border-top">
          <div class="mb-3">
            <h3 class="h5 mb-1">Attachments</h3>
            <p class="text-muted mb-0">Add files now. They will be uploaded automatically after creating the request.</p>
          </div>

          <app-inline-attachment-dropzone
            [disabled]="isLoading"
            (filesAdded)="onPendingAttachmentFilesAdded($event)">
          </app-inline-attachment-dropzone>

          <div class="mt-3">
            <app-pending-attachments-list
              [files]="myFiles"
              [disabled]="isLoading"
              [helperText]="'Selected files are queued and will upload after creating the request.'"
              (removeRequested)="removePendingAttachment($event)">
            </app-pending-attachments-list>
          </div>
        </div>
      </div>
      <div class="card-footer d-flex  d-flex justify-content-between">
        <button class="btn btn-light" [disabled]="isLoading" (click)="onCancel()">Cancel</button>
        <button class="btn btn-primary" [disabled]="isLoading" (click)="onSubmit()">Submit</button>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12">
      
      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item">
            <a routerLink="/serial-management">Serial Management</a>
          </li>
          <li class="breadcrumb-item active" aria-current="page">AGS Serial</li>
        </ol>
      </nav>
      
      <!-- Page Header with Context -->
      <div class="mb-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div class="d-flex align-items-center">
            <div class="bg-primary bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
              <i class="mdi mdi-card-account-details-star text-white fs-4"></i>
            </div>
            <div>
              <h2 class="mb-1 text-primary">AGS Serial Management</h2>
              <p class="text-muted mb-0">Track AGS serial numbers for asset identification and quality control</p>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button 
              type="button" 
              class="btn btn-primary"
              [routerLink]="['/standalone/ags-serial']"
              title="Create new AGS serial record">
              <i class="mdi mdi-plus me-2"></i>Create AGS Serial
            </button>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-header">
          <div class="d-flex align-items-center flex-wrap gap-3">
            <div class="input-group" style="width: 280px;">
              <span class="input-group-text bg-transparent border-end-0">
                <i class="mdi mdi-magnify text-muted"></i>
              </span>
              <input
                type="text"
                class="form-control border-start-0"
                placeholder="Search..."
                [(ngModel)]="searchTerm"
                (input)="onSearch()"
              />
            </div>

            <ng-select [dropdownPosition]="'bottom'" [searchable]="false" bindLabel="name" bindValue="name"
              [clearable]="false" [items]="selectedViewOptions" [(ngModel)]="selectedViewType" (change)="getData()"
              style="width:150px" [appendTo]="'body'">
            </ng-select>

            <button class="btn btn-outline-secondary" (click)="getData()" title="Refresh data">
              <i class="mdi mdi-refresh me-1"></i>Refresh
            </button>
          </div>
        </div>
        
        <div class="card-body p-0">
          <ng-container *ngIf="data?.length; else noRecords">
            <ag-grid-angular [gridOptions]="gridOptions" class="ag-theme-quartz no-border"
              style="width: 100%;height: calc(100vh - 319px);"
              [rowData]="data" [columnDefs]="columnDefs">
            </ag-grid-angular>
          </ng-container>
          <ng-template #noRecords>
            <div class="d-flex flex-column align-items-center justify-content-center p-5">
              <div class="text-center" style="max-width: 500px;">
                <div class="mb-4">
                  <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto" style="width: 120px; height: 120px;">
                    <i class="mdi mdi-database-search text-primary" style="font-size: 3rem;"></i>
                  </div>
                </div>
                <h4 class="text-body-emphasis mb-3">No AGS Serial Records Found</h4>
                <p class="text-muted mb-4">
                  No records match your current filters or date range. Try adjusting your criteria or create a new AGS serial record.
                </p>
                <button 
                  type="button" 
                  class="btn btn-primary"
                  [routerLink]="['/quality/ags-serial/create']">
                  <i class="mdi mdi-plus me-2"></i>Create First AGS Serial
                </button>
              </div>
            </div>
          </ng-template>
        </div>
      </div>
      
    </div>
  </div>
</div>

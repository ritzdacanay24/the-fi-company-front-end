<div class="row">
  <div class="content-grid col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-10">
    <div class="card">
      <div class="card-header d-flex align-items-center">
        <button class="btn btn-light btn-sm shadow-none bg-light rounded border-0 me-2"
          (click)="onCancel()"><i class="mdi mdi-arrow-left text-muted"></i> Back</button>
        <h4 class="card-title mb-0 ms-auto">{{ title }}</h4>
      </div>
      <div class="card-body" style="min-height: 300px;">
        <app-qir-options-form
          (setFormEmitter)="form = $event"
          [submitted]="submitted"
          [categories]="categories">
        </app-qir-options-form>
      </div>
      <div class="card-footer d-flex justify-content-between">
        <button class="btn btn-light" [disabled]="isLoading" (click)="onCancel()">Cancel</button>
        <button class="btn btn-primary" [disabled]="isLoading" (click)="onSubmit()">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-1"></span>
          Save
        </button>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12">

      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item">
            <a routerLink="/serial-management">Serial Management</a>
          </li>
          <li class="breadcrumb-item active" aria-current="page">SG Assets</li>
        </ol>
      </nav>

      <!-- Page Header with Context -->
      <div class="mb-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div class="d-flex align-items-center">
            <div class="bg-primary bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center"
              style="width: 60px; height: 60px;">
              <i class="mdi mdi-shield-check text-white fs-4"></i>
            </div>
            <div>
              <h2 class="mb-1 text-primary">SG Asset Management</h2>
              <p class="text-muted mb-0">Manage SG serial numbers and configure asset-specific tracking</p>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-header">
          <div class="d-flex align-items-center justify-content-start gap-2 flex-wrap">
            <div style="width: 320px; max-width: 100%;">
              <div class="form-icon">
                <input
                  type="search"
                  class="form-control form-control-icon custom-select"
                  [(ngModel)]="searchTerm"
                  (ngModelChange)="onQuickFilterChange($event)"
                  placeholder="Search SG assets..."
                >
                <i class="mdi mdi-magnify"></i>
              </div>
            </div>

            <div style="width: 180px;">
              <select class="form-select custom-select" [(ngModel)]="selectedViewType" (change)="getData()">
                <option *ngFor="let option of selectedViewOptions" [value]="option.name">
                  {{option.name}}
                </option>
              </select>
            </div>
          </div>
        </div>

        <div class="card-body p-0">
          <ag-grid-angular class="ag-theme-quartz no-border" [rowData]="data" [gridOptions]="gridOptions"
            style="width: 100%;height: calc(100vh - 319px);">
          </ag-grid-angular>
        </div>
      </div>

    </div>
  </div>
</div>

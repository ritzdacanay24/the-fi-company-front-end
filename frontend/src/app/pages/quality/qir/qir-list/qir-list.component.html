<div class="container-fluid">
  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a routerLink="/dashboard/quality">Quality</a></li>
      <li class="breadcrumb-item active" aria-current="page">Quality Issues</li>
    </ol>
  </nav>

  <div class="row justify-content-center">
    <div class="col-12">
      <!-- Page Header with Context -->
      <div class="mb-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div class="d-flex align-items-center">
            <div class="bg-danger bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
              <i class="mdi mdi-alert-circle-outline text-white fs-4"></i>
            </div>
            <div>
              <h2 class="mb-1 text-danger">Quality Incident Reports</h2>
              <p class="text-muted mb-0">Track and manage product quality issues, defects, and resolution workflows</p>
            </div>
          </div>
          <div class="d-flex align-items-center gap-3">
            <button 
              type="button" 
              class="btn btn-outline-primary"
              routerLink="/quality/overview/summary"
              title="View quality overview and summary">
              <i class="mdi mdi-chart-line me-2"></i>Quality Overview
            </button>
            <button 
              type="button" 
              class="btn btn-info"
              routerLink="../dashboard"
              title="View QIR analytics dashboard">
              <i class="mdi mdi-view-dashboard me-2"></i>Dashboard
            </button>
            <button 
              type="button" 
              class="btn btn-danger"
              (click)="onCreate()"
              title="Report new quality issue">
              <i class="mdi mdi-plus me-2"></i>Report Issue
            </button>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0 qir-list-card">
        <div class="card-body p-0">
          <div class="p-3 border-bottom">
            <div class="qir-toolbar d-flex flex-column flex-lg-row align-items-stretch align-items-lg-center gap-3">
              <div class="qir-status-select-wrap">
                <select 
                  class="form-select custom-select"
                  [(ngModel)]="selectedViewType"
                  (change)="getData()">
                  <option *ngFor="let option of selectedViewOptions" [value]="option.name">
                    {{option.name}}
                  </option>
                </select>
              </div>

              <div class="qir-search-wrap d-flex justify-content-lg-start">
                <div class="input-group qir-search-input qir-search-input-limited">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="mdi mdi-magnify"></i>
                  </span>
                  <input
                    type="text"
                    class="form-control border-start-0"
                    [(ngModel)]="quickSearchTerm"
                    (input)="onQuickSearchChange()"
                    placeholder="Search quality issues...">
                  <button
                    *ngIf="quickSearchTerm"
                    type="button"
                    class="btn btn-outline-secondary"
                    (click)="clearQuickSearch()"
                    title="Clear search">
                    <i class="mdi mdi-close"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <ng-container *ngIf="filteredData?.length; else noRecords">
            <ag-grid-angular [gridOptions]="gridOptions" class="ag-theme-quartz no-border"
              style="width: 100%;height: calc(100vh - 300px);"
              [rowData]="filteredData" [columnDefs]="columnDefs">
            </ag-grid-angular>
          </ng-container>

          <ng-template #noRecords>
            <div class="d-flex flex-column align-items-center justify-content-center p-5">
              <div class="text-center" style="max-width: 500px;">
                <div class="mb-4">
                  <div class="bg-danger bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto" style="width: 120px; height: 120px;">
                    <i class="mdi mdi-alert-circle-outline text-danger" style="font-size: 3rem;"></i>
                  </div>
                </div>
                <h4 class="text-body-emphasis mb-3">No quality issues found</h4>
                <p class="text-muted mb-4">
                  No quality issues match your current filters or date range. Try adjusting your criteria or report a new issue.
                </p>
                <button 
                  type="button" 
                  class="btn btn-danger"
                  (click)="onCreate()">
                  <i class="mdi mdi-plus me-2"></i>Report Issue
                </button>
              </div>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>

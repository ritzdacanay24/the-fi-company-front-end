<div class="row">
    <div class="col-12 col-xl-12">
        <div class="card">
            <div class="card-header">
                <div class="d-flex align-items-center">

                    <button (click)="openUploadModal()" type="button" class="btn btn-primary btn-sm me-3"
                        [disabled]="isLoading">
                        <i class="mdi mdi-upload me-1"></i>Upload Attachments
                    </button>

                    <div class="ms-auto">
                        <h4 class="card-title mb-0 flex-grow-1"> Attachments </h4>
                    </div>
                </div>
            </div>
            <div class="card-body p-0">
                <ag-grid-angular [gridOptions]="gridOptions" class="ag-theme-quartz no-border"
                    style="height: calc(100vh - 301px);" [rowData]="data" [columnDefs]="columnDefs">
                </ag-grid-angular>
            </div>
        </div>
    </div>
</div>

<app-upload-attachments-modal
    [files]="selectedFiles"
    [disabled]="isLoading"
    [isUploading]="isLoading"
    [accept]="'*/*'"
    [multiple]="true"
    [allowPaste]="true"
    [openPickerOnContainerClick]="false"
    [chooseLabel]="'Choose files'"
    [dropLabel]="'or drag them here.'"
    [pasteHint]="'Copy and paste one or more files into this area.'"
    [showPasteHint]="true"
    [uploadTriggerMode]="uploadTriggerMode"
    [manualFlowText]="'Files upload when you click Upload.'"
    [autoFlowText]="'Files upload automatically after you add them.'"
    (filesAdded)="onAttachmentFilesAdded($event)"
    (removeRequested)="removeFile($event)"
    (uploadRequested)="onUploadAttachments()">
</app-upload-attachments-modal>

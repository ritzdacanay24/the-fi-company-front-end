<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-9 col-xl-8 col-xxl-7">
      
      <!-- Page Header with Context -->
      <div class="mb-4">
        <div class="d-flex align-items-center mb-3">
          <button 
            type="button" 
            class="btn btn-outline-secondary me-3"
            (click)="goBack()"
            *ngIf="goBack"
            title="Back to RMA List">
            <i class="mdi mdi-arrow-left me-2"></i>Back
          </button>
          <div class="bg-primary bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
            <i class="mdi mdi-plus text-white fs-4"></i>
          </div>
          <div>
            <h2 class="mb-1 text-primary">{{title}}</h2>
            <p class="text-muted mb-0">Create a new RMA record for return merchandise authorization.</p>
          </div>
        </div>
        
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <app-rma-form (setFormEmitter)="setFormEmitter($event)" [submitted]="submitted"></app-rma-form>

          <div class="mt-4 pt-3 border-top">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-2">
              <h6 class="mb-0">Attachments (Optional)</h6>
              <button
                type="button"
                class="btn btn-outline-primary btn-sm"
                [disabled]="isLoading"
                (click)="uploadModal?.openModal()">
                <i class="mdi mdi-upload me-1"></i>Add Attachments
              </button>
            </div>
            <p class="text-muted small mb-0">
              Files are uploaded to AWS after you create the RMA.
              <span *ngIf="selectedFiles.length > 0">{{ selectedFiles.length }} file(s) queued.</span>
            </p>

            <div class="mt-3" *ngIf="selectedFiles.length > 0">
              <app-pending-uploads-list
                [files]="selectedFiles"
                [disabled]="isLoading"
                (removeRequested)="removeFile($event)">
              </app-pending-uploads-list>
            </div>
          </div>
        </div>
        
        <div class="card-footer bg-light border-top d-flex p-3">
          <button type="button" class="btn btn-outline-secondary me-2" [disabled]="isLoading" (click)="onCancel()">
            <i class="mdi mdi-close me-1"></i>Cancel
          </button>
          <button type="submit" class="btn btn-primary ms-auto" [disabled]="isLoading" (click)="onSubmit()">
            @if (isLoading) {
              <span class="spinner-border spinner-border-sm me-2" role="status"></span>
              Creating...
            } @else {
              <i class="mdi mdi-check-circle-outline me-1"></i>Create RMA
            }
          </button>
        </div>
      </div>
      
    </div>
  </div>
</div>

<app-upload-attachments-modal
  #uploadModal
  [modalTitle]="'Add RMA Attachments'"
  [files]="selectedFiles"
  [disabled]="isLoading"
  [isUploading]="false"
  [accept]="'*/*'"
  [multiple]="true"
  [allowPaste]="true"
  [uploadTriggerMode]="uploadTriggerMode"
  [manualFlowText]="'Files are queued and upload after you create this RMA.'"
  [parentSubmitFlowText]="'Files are queued and upload after you create this RMA.'"
  (filesAdded)="onAttachmentFilesAdded($event)"
  (removeRequested)="removeFile($event)">
</app-upload-attachments-modal>

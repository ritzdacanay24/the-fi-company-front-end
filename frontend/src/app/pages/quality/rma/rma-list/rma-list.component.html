
<div class="container-fluid">
  <app-breadcrumb [items]="breadcrumbItems()"></app-breadcrumb>

  <div class="row justify-content-center">
    <div class="col-12">
      <!-- Page Header with Context -->
      <div class="mb-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div class="d-flex align-items-center">
            <div class="bg-primary bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
              <i class="mdi mdi-undo text-white fs-4"></i>
            </div>
            <div>
              <h2 class="mb-1 text-primary">Returns Management</h2>
              <p class="text-muted mb-0">Manage product returns, authorizations, and RMA workflows</p>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button 
              type="button" 
              class="btn btn-primary"
              [routerLink]="['/quality/rma/create']"
              title="Create new RMA">
              <i class="mdi mdi-plus me-2"></i>Create RMA
            </button>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-header">
          <div class="d-flex align-items-center flex-wrap gap-3">
            <div class="form-icon" style="width: 280px;">
              <input type="search" class="form-control form-control-icon" placeholder="Search..."
                (ngModelChange)="this.gridApi?.setGridOption('quickFilterText', $event);" [(ngModel)]="searchName">
              <i class="ri-search-2-line"></i>
            </div>
            <ng-select [dropdownPosition]="'bottom'" [searchable]="false" bindLabel="name" bindValue="name"
              [clearable]="false" [items]="selectedViewOptions" [(ngModel)]="selectedViewType"
              (change)="getData()" style="width:150px" [appendTo]="'body'">
            </ng-select>
            <button class="btn btn-outline-secondary" (click)="getData()" title="Refresh data">
              <i class="mdi mdi-refresh me-1"></i>Refresh
            </button>
            <div class="ms-auto d-flex gap-2">
              <app-grid-settings [gridApi]="gridApi" [pageId]="pageId"></app-grid-settings>
              <app-grid-filters [gridApi]="gridApi" [pageId]="pageId"></app-grid-filters>
            </div>
          </div>
        </div>
        <div class="card-body p-0">
          <ng-container *ngIf="data?.length; else noRecords">
            <ag-grid-angular [gridOptions]="gridOptions" class="ag-theme-quartz no-border"
              style="width: 100%;height: calc(100vh - 300px);"
              [rowData]="data" [columnDefs]="columnDefs">
            </ag-grid-angular>
          </ng-container>

          <ng-template #noRecords>
            <div class="d-flex flex-column align-items-center justify-content-center p-5">
              <div class="text-center" style="max-width: 500px;">
                <div class="mb-4">
                  <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto" style="width: 120px; height: 120px;">
                    <i class="mdi mdi-archive-arrow-down text-primary" style="font-size: 3rem;"></i>
                  </div>
                </div>
                <h4 class="text-body-emphasis mb-3">No return records found</h4>
                <p class="text-muted mb-4">
                  No RMA records match your current filters or date range. Try adjusting your criteria or create a new RMA.
                </p>
                <button 
                  type="button" 
                  class="btn btn-primary"
                  [routerLink]="['/quality/rma/create']">
                  <i class="mdi mdi-plus me-2"></i>Create RMA
                </button>
              </div>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-header">
  <h5 class="modal-title">Manage Recipients and Assignees</h5>
  <button type="button" class="btn-close" aria-label="Close" (click)="onCancel()"></button>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="modal-body">
    <div class="mb-3">
      <div class="fw-semibold">{{ job?.name }}</div>
      <small class="text-muted">Use subscribers for email delivery and assignees for operational ownership.</small>
    </div>

    <div class="alert alert-info py-2" *ngIf="isLoadingUsers()">
      Loading active users...
    </div>

    <div formArrayName="recipients">
      <div
        class="recipient-row border rounded p-3 mb-3"
        *ngFor="let recipientGroup of recipientsFormArray.controls; let i = index; trackBy: trackByIndex"
        [formGroupName]="i"
      >
        <div class="d-flex justify-content-between align-items-center mb-2">
          <div class="fw-semibold">Recipient {{ i + 1 }}</div>
          <button type="button" class="btn btn-sm btn-outline-danger" (click)="removeRecipient(i)" [disabled]="recipientCount() === 1">
            Remove
          </button>
        </div>

        <div class="row g-2">
          <div class="col-md-3">
            <label class="form-label">Type</label>
            <select class="form-select" formControlName="recipientType" (change)="onRecipientTypeChange(i)">
              <option value="external_email">External Email</option>
              <option value="internal_user">Internal User</option>
            </select>
          </div>

          <div class="col-md-4" *ngIf="recipientGroup.get('recipientType')?.value === 'internal_user'">
            <label class="form-label">Internal User</label>
            <select class="form-select" formControlName="userId">
              <option [ngValue]="null">Select user</option>
              <option *ngFor="let user of users(); trackBy: trackByIndex" [ngValue]="user.id">{{ user.label }}</option>
            </select>
            <small class="text-warning d-block mt-1" *ngIf="isInactiveOrMissingInternalUser(i)">
              Selected user is inactive or missing. Keep only if this recipient should remain historical.
            </small>
          </div>

          <div class="col-md-4" *ngIf="recipientGroup.get('recipientType')?.value === 'external_email'">
            <label class="form-label">External Email</label>
            <input class="form-control" formControlName="email" type="email" placeholder="name@company.com" />
          </div>

          <div class="col-md-3" *ngIf="recipientGroup.get('recipientType')?.value === 'external_email'">
            <label class="form-label">Display Name</label>
            <input class="form-control" formControlName="displayName" type="text" placeholder="Optional" />
          </div>

          <div class="col-md-2">
            <label class="form-label">Scope</label>
            <select class="form-select" formControlName="notificationScope">
              <option value="always">Always</option>
              <option value="on_failure">On Failure</option>
            </select>
          </div>
        </div>

        <div class="mt-3 d-flex flex-wrap gap-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" formControlName="isSubscribed" [id]="'isSubscribed' + i" />
            <label class="form-check-label" [for]="'isSubscribed' + i">Subscribed</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" formControlName="isAssignee" [id]="'isAssignee' + i" />
            <label class="form-check-label" [for]="'isAssignee' + i">Assignee</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" formControlName="active" [id]="'active' + i" />
            <label class="form-check-label" [for]="'active' + i">Active</label>
          </div>
        </div>
      </div>
    </div>

    <button type="button" class="btn btn-outline-primary" (click)="addRecipient()">
      Add Recipient
    </button>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
    <button type="submit" class="btn btn-primary" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Saving...' : 'Save Recipients' }}
    </button>
  </div>
</form>

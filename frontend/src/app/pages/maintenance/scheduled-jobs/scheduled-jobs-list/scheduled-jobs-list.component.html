<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h4 class="card-title mb-0 flex-grow-1 text-start">{{ title }}</h4>
        <span class="badge bg-primary">{{ activeCount }} Active</span>
      </div>
      <div class="card-body">
        <table class="table table-bordered table-sm align-middle">
          <thead>
            <tr>
              <th style="width: 120px;">Status</th>
              <th style="width: 140px;">Cron</th>
              <th>Job</th>
              <th>Endpoint</th>
              <th style="width: 120px;">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of jobs" class="align-middle">
              <td>
                <span class="badge" [ngClass]="row.active ? 'bg-success' : 'bg-secondary'">
                  {{ row.active ? 'Enabled' : 'Disabled' }}
                </span>
              </td>
              <td>
                <code>{{ row.cron }}</code>
              </td>
              <td>
                <div class="fw-semibold">{{ row.name }}</div>
                <small class="text-muted" *ngIf="row.note">{{ row.note }}</small>
              </td>
              <td class="text-break">
                <a *ngIf="isExternalUrl(row.url)" [href]="row.url" target="_blank" rel="noopener noreferrer">{{ row.url }}</a>
                <code *ngIf="!isExternalUrl(row.url)">{{ row.url }}</code>
              </td>
              <td>
                <button class="btn btn-sm btn-primary" (click)="runJob(row)" [disabled]="isRunning(row.id)">
                  {{ isRunning(row.id) ? 'Running...' : 'Run Job' }}
                </button>
                <button class="btn btn-sm btn-outline-secondary ms-2" (click)="openEditModal(row)">
                  Edit
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<form [formGroup]="form" autocomplete="off">
    <div class="row">
        <div class="col-md mb-2">
            <label class="form-label required">Notification Group</label>
            <select class="form-select" formControlName="location">
                <option [ngValue]="null">Select a notification group</option>
                <optgroup label="{{ row.key }}" *ngFor="let row of fileName | keyvalue">
                    <option *ngFor="let item of $any(row.value)" [value]="item.value">{{ item.name }}</option>
                </optgroup>
            </select>
            <small class="text-muted">Recipients listed below will receive emails for the selected group.</small>
        </div>
    </div>

</form>

<div class="container-fluid">
  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a routerLink="/dashboard/operations">Operations</a></li>
      <li class="breadcrumb-item"><a routerLink="/operations/graphics">Graphics</a></li>
      <li class="breadcrumb-item active" aria-current="page">BOM Management</li>
    </ol>
  </nav>

  <div class="row justify-content-center">
    <div class="col-12">
      <!-- Page Header with Context -->
      <div class="mb-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div class="d-flex align-items-center">
            <div class="bg-success bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
              <i class="mdi mdi-format-list-bulleted text-white fs-4"></i>
            </div>
            <div>
              <h2 class="mb-1 text-success">BOM Management</h2>
              <p class="text-muted mb-0">Manage Bill of Materials for graphics production and component tracking</p>
            </div>
          </div>
          <div class="d-flex align-items-center gap-3">
            <div class="d-flex align-items-center gap-2">
              <span class="text-muted small">Total BOMs:</span>
              <span class="badge bg-success-subtle text-success fw-bold">{{ getTotalCount() }}</span>
            </div>
            <button 
              type="button" 
              class="btn btn-success"
              (click)="onCreate()"
              title="Create new BOM">
              <i class="mdi mdi-plus me-2"></i>Create BOM
            </button>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-header">
          <div class="d-flex align-items-center flex-wrap gap-3">
            <div class="form-icon">
              <input type="text" class="form-control form-control-icon" style="width:250px"
                (ngModelChange)="this.gridApi.setGridOption('quickFilterText', query);" [(ngModel)]="query"
                placeholder="Search BOMs...">
              <i class="ri-search-2-line"></i>
            </div>
            <button class="btn btn-outline-secondary" (click)="getData()" title="Refresh data">
              <i class="mdi mdi-refresh me-1"></i>Refresh
            </button>
            <div class="ms-auto d-flex align-items-center gap-2">
              <app-grid-settings [gridApi]="gridApi" [pageId]="pageId"></app-grid-settings>
              <app-grid-filters [gridApi]="gridApi" [pageId]="pageId"></app-grid-filters>
            </div>
          </div>
        </div>
        <div class="card-body p-0">
          <ng-container *ngIf="data?.length; else noRecords">
            <ag-grid-angular [gridOptions]="gridOptions" class="ag-theme-quartz no-border"
              style="width: 100%;height: calc(100vh - 300px);"
              [rowData]="data" [columnDefs]="columnDefs">
            </ag-grid-angular>
          </ng-container>

          <ng-template #noRecords>
            <div class="d-flex flex-column align-items-center justify-content-center p-5">
              <div class="text-center" style="max-width: 500px;">
                <div class="mb-4">
                  <div class="bg-success bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto" style="width: 120px; height: 120px;">
                    <i class="mdi mdi-format-list-bulleted text-success" style="font-size: 3rem;"></i>
                  </div>
                </div>
                <h4 class="text-body-emphasis mb-3">No BOM records found</h4>
                <p class="text-muted mb-4">
                  No Bill of Materials match your current search or date range. Try adjusting your criteria.
                </p>
              </div>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>

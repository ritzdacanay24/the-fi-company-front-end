<div class="container-fluid">
  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a routerLink="/dashboard/operations">Operations</a></li>
      <li class="breadcrumb-item"><a routerLink="/operations/graphics">Graphics</a></li>
      <li class="breadcrumb-item active" aria-current="page">Graphics List</li>
    </ol>
  </nav>

  <div class="row justify-content-center">
    <div class="col-12">
      <!-- Page Header with Context -->
      <div class="mb-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div class="d-flex align-items-center">
            <div class="bg-info bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
              <i class="mdi mdi-image text-white fs-4"></i>
            </div>
            <div>
              <h2 class="mb-1 text-info">Graphics Management</h2>
              <p class="text-muted mb-0">Manage graphics assets, artwork files, and visual production materials</p>
            </div>
          </div>
          <div class="d-flex align-items-center gap-3">
            <div class="d-flex align-items-center gap-2">
              <span class="text-muted small">Total Graphics:</span>
              <span class="badge bg-info-subtle text-info fw-bold">{{ getTotalCount() }}</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-header">
          <div class="d-flex align-items-center flex-wrap gap-3">
            <div class="form-icon">
              <input type="search" class="form-control form-control-icon" style="width:250px"
                (ngModelChange)="setFilter($event);" [(ngModel)]="query" placeholder="Search graphics...">
              <i class="ri-search-2-line"></i>
            </div>
            <select class="form-select" style="width:140px" [(ngModel)]="selectedViewType" (change)="onViewTypeChange()">
              <option value="Open">Open</option>
              <option value="All">All</option>
            </select>
            <button class="btn btn-outline-secondary" (click)="getData()" title="Refresh data">
              <i class="mdi mdi-refresh me-1"></i>Refresh
            </button>
          </div>
        </div>
        <div class="card-body p-0">
          <ng-container *ngIf="data?.length; else noRecords">
            <ag-grid-angular [gridOptions]="gridOptions" class="ag-theme-quartz no-border"
              style="width: 100%;height: calc(100vh - 300px);"
              [rowData]="data" [columnDefs]="columnDefs">
            </ag-grid-angular>
          </ng-container>

          <ng-template #noRecords>
            <div class="d-flex flex-column align-items-center justify-content-center p-5">
              <div class="text-center" style="max-width: 500px;">
                <div class="mb-4">
                  <div class="bg-info bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto" style="width: 120px; height: 120px;">
                    <i class="mdi mdi-image text-info" style="font-size: 3rem;"></i>
                  </div>
                </div>
                <h4 class="text-body-emphasis mb-3">No graphics found</h4>
                <p class="text-muted mb-4">
                  No graphics assets match your current search or date range. Try adjusting your criteria.
                </p>
              </div>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>

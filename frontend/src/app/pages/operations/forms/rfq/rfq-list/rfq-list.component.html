<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12">

      <!-- Breadcrumb Navigation -->
      <app-breadcrumb [items]="breadcrumbItems()"></app-breadcrumb>
      
      <!-- Page Header with Context -->
      <div class="mb-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div class="d-flex align-items-center">
            <div class="bg-secondary bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
              <i class="mdi mdi-file-document-outline text-white fs-4"></i>
            </div>
            <div>
              <h2 class="mb-1 text-secondary">Request for Quote (RFQ)</h2>
              <p class="text-muted mb-0">Manage and track requests for quotes from vendors and suppliers</p>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button 
              type="button" 
              class="btn btn-outline-primary"
              [routerLink]="['/operations/forms/rfq/create']"
              title="Create new RFQ">
              <i class="mdi mdi-plus me-2"></i>New RFQ
            </button>
            <button 
              type="button" 
              class="btn btn-outline-secondary"
              title="View RFQ reports">
              <i class="mdi mdi-chart-line me-2"></i>Reports
            </button>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-header">
          <div class="d-flex align-items-center">
            <div class="form-icon me-3">
              <input type="search" class="form-control form-control-icon" style="width:300px"
                (ngModelChange)="this.gridApi?.setGridOption('quickFilterText', $event);" [value]="searchName" [(ngModel)]="searchName"
                placeholder="Search RFQs by vendor, item, reference...">
              <i class="mdi mdi-magnify"></i>
            </div>
            <button class="btn btn-outline-secondary" (click)="getData()" title="Refresh data">
              <i class="mdi mdi-refresh me-1"></i>Refresh
            </button>
          </div>
        </div>
        
        <div class="card-body p-0">
          <ng-container *ngIf="data?.length; else noRecords">
            <ag-grid-angular class="ag-theme-quartz no-border" [rowData]="data" [columnDefs]="columnDefs"
              [gridOptions]="gridOptions" style="width: 100%;height: calc(100vh - 291px);">
            </ag-grid-angular>
          </ng-container>
          <ng-template #noRecords>
            <div class="d-flex flex-column align-items-center justify-content-center p-5">
              <div class="text-center" style="max-width: 500px;">
                <div class="mb-4">
                  <div class="bg-secondary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto" style="width: 120px; height: 120px;">
                    <i class="mdi mdi-file-document-outline text-secondary" style="font-size: 3rem;"></i>
                  </div>
                </div>
                <h4 class="text-body-emphasis mb-3">No RFQs Found</h4>
                <p class="text-muted mb-4">
                  No requests for quotes match your current filters. Try adjusting your date range, status, or create a new RFQ.
                </p>
                <button 
                  type="button" 
                  class="btn btn-secondary"
                  [routerLink]="['/operations/forms/rfq/create']">
                  <i class="mdi mdi-plus me-2"></i>Create First RFQ
                </button>
              </div>
            </div>
          </ng-template>
        </div>
        
      </div>
      
    </div>
  </div>
</div>

<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12">
      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a routerLink="/dashboard/operations">Operations</a></li>
          <li class="breadcrumb-item"><a routerLink="/operations/forms">Forms</a></li>
          <li class="breadcrumb-item active" aria-current="page">Safety Incidents</li>
        </ol>
      </nav>

      <!-- Page Header with Context -->
      <div class="mb-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div class="d-flex align-items-center">
            <div class="bg-warning bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
              <i class="mdi mdi-shield-alert text-white fs-4"></i>
            </div>
            <div>
              <h2 class="mb-1 text-warning">Safety Incidents</h2>
              <p class="text-muted mb-0">Track open incidents, review statuses, and manage follow-ups</p>
            </div>
          </div>
          <button class="btn btn-primary" routerLink="/operations/forms/safety-incident/create">
            <i class="mdi mdi-plus me-1"></i>New Incident
          </button>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-header">
          <div class="d-flex align-items-center flex-wrap gap-3">
            <div class="form-icon">
              <input type="search" class="form-control form-control-icon" style="width:250px"
                (ngModelChange)="this.gridApi?.setGridOption('quickFilterText', $event);" [value]="searchName"
                [(ngModel)]="searchName" placeholder="Search incidents...">
              <i class="ri-search-2-line"></i>
            </div>

            <ng-select [dropdownPosition]="'bottom'" [searchable]="false" bindLabel="name" bindValue="name"
              [clearable]="false" [items]="selectedViewOptions" [(ngModel)]="selectedViewType" (change)="getData()"
              style="width:150px" [appendTo]="'body'">
            </ng-select>

            <div class="ms-auto d-flex gap-2">
              <app-grid-settings [gridApi]="gridApi" [pageId]="pageId"></app-grid-settings>
              <app-grid-filters [gridApi]="gridApi" [pageId]="pageId"></app-grid-filters>
            </div>
          </div>
        </div>
        <div class="card-body p-0">
          <ng-container *ngIf="data?.length; else noRecords">
            <ag-grid-angular class="ag-theme-quartz no-border" [rowData]="data" [columnDefs]="columnDefs"
              [gridOptions]="gridOptions" style="width: 100%;height: calc(100vh - 294px);">
            </ag-grid-angular>
          </ng-container>

          <ng-template #noRecords>
            <div class="d-flex flex-column align-items-center justify-content-center p-5">
              <div class="text-center" style="max-width: 500px;">
                <div class="mb-4">
                  <div class="bg-warning bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto" style="width: 120px; height: 120px;">
                    <i class="mdi mdi-shield-alert text-warning" style="font-size: 3rem;"></i>
                  </div>
                </div>
                <h4 class="text-body-emphasis mb-3">No open safety incidents found</h4>
                <p class="text-muted mb-4">
                  There are no open safety incidents matching your current filters. Try adjusting your criteria or create a new incident report.
                </p>
                <button 
                  type="button" 
                  class="btn btn-warning"
                  [routerLink]="['/operations/forms/safety-incident/create']">
                  <i class="mdi mdi-plus me-2"></i>Report Incident
                </button>
              </div>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>

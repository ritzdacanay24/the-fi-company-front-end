<div class="container-fluid">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h2 class="mb-1">{{ title }}</h2>
      <p class="text-muted mb-0">Maintain computer units and track maintenance history.</p>
    </div>
    <button class="btn btn-primary" (click)="onCreate()">
      <i class="mdi mdi-plus me-1"></i>Add Computer
    </button>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-3">
      <div class="row g-2 mb-3">
        <div class="col-md-3">
          <label class="form-label">View</label>
          <select class="form-select" [(ngModel)]="selectedViewType" (change)="getData()">
            <option>Active</option>
            <option>Inactive</option>
            <option>All</option>
          </select>
        </div>
        <div class="col-md-5">
          <label class="form-label">Search</label>
          <div class="input-group">
            <span class="input-group-text"><i class="mdi mdi-magnify"></i></span>
            <input
              type="text"
              class="form-control"
              placeholder="Search type, asset tag, computer name, model, department"
              [(ngModel)]="searchTerm"
              (ngModelChange)="onSearchChange($event)"
            />
            <button class="btn btn-outline-secondary" type="button" (click)="clearSearch()">Clear</button>
          </div>
        </div>
      </div>

      <div class="alert alert-info" *ngIf="isLoading">Loading computers...</div>

      <div *ngIf="!isLoading">
        <ag-grid-angular
          class="ag-theme-quartz"
          [rowData]="data"
          [columnDefs]="columnDefs"
          [gridOptions]="gridOptions"
          style="width: 100%; height: calc(100vh - 280px); min-height: 480px;"
        >
        </ag-grid-angular>
      </div>
    </div>
  </div>
</div>

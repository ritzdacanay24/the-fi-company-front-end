<div class="container-fluid">
  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h3 class="h5 mb-3">{{ title }}</h3>
      <app-computer-form (setFormEmitter)="setFormEmitter($event)" [submitted]="submitted"></app-computer-form>

      <div class="mt-4 pt-4 border-top">
        <h5 class="mb-2">Attachments</h5>
        <app-inline-attachment-dropzone [disabled]="isLoading" (filesAdded)="onAttachmentFilesAdded($event)"></app-inline-attachment-dropzone>
        <div class="mt-2">
          <app-pending-attachments-list
            [files]="selectedFiles"
            [disabled]="isLoading"
            [helperText]="'Files upload after computer record is created.'"
            (removeRequested)="removeFile($event)">
          </app-pending-attachments-list>
        </div>
      </div>
    </div>
    <div class="card-footer bg-light d-flex p-3">
      <button class="btn btn-outline-secondary" [disabled]="isLoading" (click)="onCancel()">Cancel</button>
      <button class="btn btn-primary ms-auto" [disabled]="isLoading" (click)="onSubmit()">Create Computer</button>
    </div>
  </div>
</div>

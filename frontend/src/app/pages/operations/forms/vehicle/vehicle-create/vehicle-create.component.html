<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-11 col-xl-10 col-xxl-8">
      
      <!-- Page Header with Context -->
      <div class="mb-4">
        <div class="d-flex align-items-center mb-3">
          <button 
            type="button" 
            class="btn btn-outline-secondary me-3"
            (click)="goBack()"
            *ngIf="goBack"
            title="Back to Vehicle List">
            <i class="mdi mdi-arrow-left me-2"></i>Back
          </button>
          <div class="bg-dark bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
            <i class="mdi mdi-plus text-white fs-4"></i>
          </div>
          <div>
            <h2 class="mb-1 text-dark">{{title}}</h2>
            <p class="text-muted mb-0">Register a new company vehicle with comprehensive tracking and maintenance details</p>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <app-vehicle-form (setFormEmitter)="setFormEmitter($event)" [submitted]="submitted"></app-vehicle-form>

          <!-- File Upload Section -->
          <div class="mb-3 mt-4">
            <div class="mb-3">
              <h3 class="h5 mb-1">Vehicle Documents</h3>
              <p class="text-muted mb-0">
                Upload vehicle-related documents, registration, or maintenance records.
              </p>
            </div>
            <app-upload-new-attachments
              [files]="myFiles"
              [disabled]="isLoading"
              [pendingViewMode]="'table'"
              [accept]="'*/*'"
              [multiple]="true"
              [allowPaste]="true"
              [openPickerOnContainerClick]="true"
              [chooseLabel]="'Choose files'"
              [dropLabel]="'or drag them here.'"
              [uploadTriggerMode]="uploadTriggerMode"
              [parentSubmitFlowText]="'Files are queued here and upload when you submit the form.'"
              (filesAdded)="onAttachmentFilesAdded($event)"
              (removeRequested)="removeFile($event)">
            </app-upload-new-attachments>
          </div>
        </div>
        
        <div class="card-footer bg-light border-top d-flex p-3">
          <button type="button" class="btn btn-outline-secondary me-2" [disabled]="isLoading" (click)="onCancel()">
            <i class="mdi mdi-close me-1"></i>Cancel
          </button>
          <button type="submit" class="btn btn-dark ms-auto" [disabled]="isLoading" (click)="onSubmit()">
            @if (isLoading) {
              <span class="spinner-border spinner-border-sm me-2" role="status"></span>
              Creating Vehicle...
            } @else {
              <i class="mdi mdi-check-circle-outline me-1"></i>Create Vehicle
            }
          </button>
        </div>
      </div>
      
    </div>
  </div>
</div>

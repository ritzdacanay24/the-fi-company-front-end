<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-11 col-xl-10 col-xxl-8">
      
      <!-- Page Header with Context -->
      <div class="mb-4">
        <div class="d-flex align-items-center mb-3">
          <button 
            type="button" 
            class="btn btn-outline-secondary me-3"
            (click)="goBack()"
            *ngIf="goBack"
            title="Back to Vehicle Inspection List">
            <i class="mdi mdi-arrow-left me-2"></i>Back
          </button>
          <div class="bg-primary bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
            <i class="mdi mdi-plus text-white fs-4"></i>
          </div>
          <div>
            <h2 class="mb-1 text-primary">{{title}}</h2>
            <p class="text-muted mb-0">Create a new vehicle inspection record</p>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <app-vehicle-inspection-form (setFormEmitter)="setFormEmitter($event)"
              (setDetailsFormEmitter)="setDetailsFormEmitter($event)" [submitted]="submitted"
              (setFormErrorsEmitter)="setFormErrorsEmitter($event)"
              (hasUnresolvedFailures)="setHasUnresolvedFailures($event)"
              [showInspectorName]="false"></app-vehicle-inspection-form>

          <div class="mt-4" *ngIf="form?.value?.truck_license_plate && !form?.value?.not_used">
            <div>
              <div class="mb-3">
                <h6 class="mb-1"><i class="mdi mdi-image-multiple me-2"></i>Vehicle Photos (Optional)</h6>
                <p class="text-muted mb-0">Capture extra photos on the spot (damage, decals, interior, etc.).</p>
              </div>
              <button
                type="button"
                class="btn btn-outline-primary btn-sm"
                (click)="additionalPhotosModal?.openModal()"
                [disabled]="isLoading">
                <i class="mdi mdi-upload me-1"></i>Add Optional Photos
              </button>

              <div class="mt-3" *ngIf="additionalVehiclePhotos.length > 0">
                <app-pending-uploads-list
                  [files]="additionalVehiclePhotos"
                  [disabled]="isLoading"
                  (removeRequested)="removeAdditionalVehiclePhoto($event)">
                </app-pending-uploads-list>
              </div>
            </div>
          </div>
          <div class="alert alert-info mt-4" *ngIf="form?.value?.not_used">
            <i class="mdi mdi-information-outline me-2"></i>
            <small>Vehicle not used today — photo uploads are not required.</small>
          </div>
        </div>
        
        <div class="card-footer bg-light border-top d-flex p-3">
          <button type="button" class="btn btn-outline-secondary me-2" [disabled]="isLoading" (click)="onCancel()">
            <i class="mdi mdi-close me-1"></i>Cancel
          </button>
          <button type="submit" class="btn btn-primary ms-auto" 
              [disabled]="isLoading" 
                  (click)="onSubmit()"
              title="Create Inspection">
            @if (isLoading) {
              <span class="spinner-border spinner-border-sm me-2" role="status"></span>
              Creating...
            } @else {
              <i class="mdi mdi-check-circle-outline me-1"></i>Create Inspection
            }
          </button>
        </div>
      </div>
      
    </div>
  </div>
</div>

<app-upload-attachments-modal
  #additionalPhotosModal
  [files]="additionalVehiclePhotos"
  [disabled]="isLoading"
  [isUploading]="isLoading"
  [accept]="'image/*'"
  [multiple]="true"
  [allowPaste]="true"
  [openPickerOnContainerClick]="false"
  [chooseLabel]="'Choose photos'"
  [dropLabel]="'or drag them here.'"
  [pasteHint]="'Copy and paste one or more photos into this area.'"
  [showPasteHint]="true"
  [uploadTriggerMode]="uploadTriggerMode"
  [manualFlowText]="'Photos upload after you create the inspection.'"
  [autoFlowText]="'Photos upload after you add them.'"
  (filesAdded)="onAdditionalVehiclePhotosChange($event)"
  (removeRequested)="removeAdditionalVehiclePhoto($event)">
</app-upload-attachments-modal>

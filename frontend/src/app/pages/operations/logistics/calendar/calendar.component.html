<div class="calendar-wrapper d-lg-flex gap-1 mx-n4 mt-n4 p-1">
    <div class="calendar-leftsidebar minimal-border">
        <div class="px-4 pt-4 mb-3">
            <div class="d-flex align-items-start mb-4">
                <div class="flex-grow-1">
                    <h5 class="mb-0">Operations Calendar</h5>
                    <small class="text-muted">Logistics scheduling</small>
                </div>
                <div class="flex-shrink-0">
                    <div class="btn-group" role="group" aria-label="View switcher">
                        <button type="button" class="btn btn-sm btn-outline-primary" title="List View" disabled>
                            <i class="mdi mdi-format-list-checks align-bottom"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-primary active" title="Calendar View">
                            <i class="mdi mdi-calendar-month-outline align-bottom"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="mini-calendar mb-4">
                <div class="mini-calendar-header">
                    <button class="btn btn-sm btn-ghost-secondary" (click)="previousMonth()">
                        <i class="mdi mdi-chevron-left"></i>
                    </button>
                    <span class="fw-semibold">{{ currentMiniMonth() }}</span>
                    <button class="btn btn-sm btn-ghost-secondary" (click)="nextMonth()">
                        <i class="mdi mdi-chevron-right"></i>
                    </button>
                </div>
                <div class="mini-calendar-grid">
                    <div class="mini-calendar-weekdays">
                        <div class="mini-calendar-weekday">Su</div>
                        <div class="mini-calendar-weekday">Mo</div>
                        <div class="mini-calendar-weekday">Tu</div>
                        <div class="mini-calendar-weekday">We</div>
                        <div class="mini-calendar-weekday">Th</div>
                        <div class="mini-calendar-weekday">Fr</div>
                        <div class="mini-calendar-weekday">Sa</div>
                    </div>
                    <div class="mini-calendar-days">
                        <div class="mini-calendar-day"
                            *ngFor="let day of miniCalendarDays()"
                            [class.other-month]="!day.currentMonth"
                            [class.today]="day.isToday"
                            [class.selected]="day.isSelected"
                            [class.has-events]="day.hasEvents"
                            (click)="selectMiniDate(day)">
                            {{ day.day }}
                        </div>
                    </div>
                </div>
            </div>

            <div class="filters-section">
                <h6 class="text-muted text-uppercase fs-11 mb-3">Filters</h6>
                <div class="mb-3">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <label class="form-label mb-0 fw-semibold">Event Type</label>
                    </div>
                    <div class="filter-options">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filterAll" [(ngModel)]="filters.showAll"
                                (change)="onFilterChange('all')">
                            <label class="form-check-label" for="filterAll">All Events</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filterScheduler" [(ngModel)]="filters.showScheduler"
                                (change)="onFilterChange('scheduler')">
                            <label class="form-check-label" for="filterScheduler">Field Service</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filterOther" [(ngModel)]="filters.showOther"
                                (change)="onFilterChange('other')">
                            <label class="form-check-label" for="filterOther">Other Events</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="calendar-main-content w-100 minimal-border">
        <div class="p-3 calendar-topbar">
            <div class="row align-items-center">
                <div class="col-sm-8 col-8">
                    <h4 class="mb-0">{{ currentViewTitle() }}</h4>
                </div>
                <div class="col-sm-4 col-4 text-end">
                    <ul class="list-inline calendar-nav text-end mb-0">
                        <li class="list-inline-item">
                            <button class="btn btn-sm btn-primary" (click)="refreshCurrentView()">
                                <i class="mdi mdi-refresh me-1"></i>
                                Refresh
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="row align-items-center g-2 mt-2">
                <div class="col-xl-4 col-md-6 text-xl-start">
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-sm btn-soft-primary" (click)="navigateDate('prev')">
                            <i class="mdi mdi-chevron-left"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-soft-primary" (click)="goToToday()">Today</button>
                        <button type="button" class="btn btn-sm btn-soft-primary" (click)="navigateDate('next')">
                            <i class="mdi mdi-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="col-xl-8 col-md-6 text-xl-end">
                    <div class="btn-group me-2" role="group">
                        <button type="button" class="btn btn-sm btn-outline-primary" [class.active]="currentView === 'month'"
                            (click)="switchView('month')">Month</button>
                        <button type="button" class="btn btn-sm btn-outline-primary" [class.active]="currentView === 'week'"
                            (click)="switchView('week')">Week</button>
                        <button type="button" class="btn btn-sm btn-outline-primary" [class.active]="currentView === 'day'"
                            (click)="switchView('day')">Day</button>
                    </div>
                    <button type="button" class="btn btn-sm btn-primary me-2" (click)="createEvent()">
                        <i class="mdi mdi-plus me-1"></i>New Event
                    </button>
                </div>
            </div>
            <div class="d-flex align-items-center gap-2 flex-wrap mt-3">
                <div class="bg-primary bg-opacity-10 px-3 py-1 rounded stats-badge">
                    <small class="text-primary fw-semibold">Total: {{ totalEvents }}</small>
                </div>
                <div class="bg-warning bg-opacity-10 px-3 py-1 rounded stats-badge">
                    <small class="text-warning fw-semibold">Pending: {{ pendingEvents }}</small>
                </div>
                <div class="bg-success bg-opacity-10 px-3 py-1 rounded stats-badge">
                    <small class="text-success fw-semibold">Completed: {{ completedEvents }}</small>
                </div>
            </div>
        </div>

        <div class="calendar-content p-0">
            <div class="calendar-wrapper-inner" style="width: 100%; height: calc(100vh - 230px);">
                <mbsc-eventcalendar [selectedDate]="start" #myTimeline [data]="filteredEvents" [options]="eventSettings"
                    [view]="calView"></mbsc-eventcalendar>
            </div>
        </div>
    </div>
</div>

<div class="modal-header">
    <h4 class="modal-title">Create Event</h4>
    <button type="button" class="btn-close" data-bs-dismiss="modal" (click)="dismiss()" aria-label="Close"></button>
</div>

<div class="modal-body">
    <app-calendar-form (setFormEmitter)="setFormEmitter($event)"></app-calendar-form>

    <div class="card mt-3">
        <div class="card-header bg-body fw-semibold">Attachments</div>
        <div class="card-body">
            <app-inline-attachment-dropzone
                [disabled]="loadingIndicator"
                (filesAdded)="onAttachmentFilesAdded($event)">
            </app-inline-attachment-dropzone>

            <div class="mt-3">
                <app-pending-attachments-list
                    [files]="selectedFiles"
                    [disabled]="loadingIndicator"
                    [helperText]="'Selected files are queued and will upload after creating the event.'"
                    (removeRequested)="removeFile($event)">
                </app-pending-attachments-list>
            </div>
        </div>
    </div>

</div>

<div class="modal-footer">
    <button class="btn btn-light" (click)="dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="onSubmit()" [disabled]="loadingIndicator">Save</button>
</div>

<div class="demand-v1-page" [style.margin-right.px]="commentPanelPushWidth">
  <div class="row">
    <div class="col-12 col-xl-12">
      <div class="card">
      <div class="card-header d-flex align-items-center flex-wrap gap-2">
        <div class="form-icon demand-v1-search">
          <input
            type="text"
            class="form-control form-control-icon"
            placeholder="Filter rows"
            [value]="query"
            (input)="onQuickFilter($any($event.target).value)"
          />
          <i class="ri-search-2-line"></i>
        </div>

        <div class="d-flex align-items-center gap-2 flex-wrap">
          <button type="button" class="btn btn-light" (click)="fetchBOM()" [disabled]="loading">
            Refresh
          </button>
          <button type="button" class="btn btn-light" (click)="toggleOpenGroups()">
            {{ showOpenOnly ? 'Show All Groups' : 'Show Open Only' }}
          </button>
          <button type="button" class="btn btn-light" (click)="toggleAllGroups()">
            {{ groupsExpanded ? 'Collapse All' : 'Expand All' }}
          </button>
        </div>

        <div class="btn-group me-2" role="group" aria-label="Graphics demand view switcher">
          <button type="button" class="btn btn-outline-primary" (click)="goToLegacyDemand()">
            Demand (Legacy)
          </button>
          <button type="button" class="btn btn-primary" (click)="goToDemandV1()" disabled>
            Demand V1
          </button>
        </div>

        <h4 class="card-title mb-0 ms-auto">Graphics Demand V1</h4>
      </div>

      <div class="card-body p-0 position-relative">
        <div *ngIf="error" class="alert alert-danger m-3 mb-0">{{ error }}</div>

        <div *ngIf="loading" class="demand-v1-loading-overlay">
          <div class="spinner-border text-primary me-2"></div>
          Loading graphics demand data...
        </div>
<!-- This shoild be the agrid to the component -->
        <ag-grid-angular
          class="ag-theme-quartz no-border"
          style="height: calc(100vh - 170px);"
          [gridOptions]="gridOptions"
          [rowData]="bomData"
          [columnDefs]="columnDefs"
          (selectionChanged)="onSelectionChanged()"
        >
        </ag-grid-angular>
      </div>

      </div>
    </div>
  </div>
</div>

<app-comment-offcanvas
  [isOpen]="isCommentPanelOpen"
  [orderNum]="selectedCommentOrderNum"
  [type]="'Graphics Demand'"
  [title]="'Graphics Demand Comments'"
  [commentViewMode]="commentViewMode"
  (closed)="closeCommentPanel()"
  (commentViewModeChange)="setCommentViewMode($event)"
  (panelWidthChange)="onCommentPanelWidthChange($event)"
  (saved)="onCommentSaved($event)">
</app-comment-offcanvas>

<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12">
      <!-- Page Header -->
      <div class="mb-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div class="d-flex align-items-center">
            <div class="bg-primary bg-gradient rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
              <i class="mdi mdi-clipboard-list text-white fs-4"></i>
            </div>
            <div>
              <h2 class="mb-1 text-primary">Material Requests</h2>
              <p class="text-muted mb-0">Track and manage material request workflows for operations</p>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-header">
          <div class="d-flex align-items-center flex-wrap gap-3">
            <app-date-range (setDateRange)="onChangeDate($event)" [value]="dateRange" [disabled]="this.isAll"
              [displayOptions]="true"></app-date-range>
            <ng-select [dropdownPosition]="'bottom'" [searchable]="false" bindLabel="name" bindValue="name"
              [clearable]="false" [items]="selectedViewOptions" [(ngModel)]="selectedViewType" (change)="getData()"
              style="width:150px" [appendTo]="'body'">
            </ng-select>
            <div class="form-check form-switch form-switch-md">
              <input class="form-check-input" type="checkbox" id="flexSwitchCheckDefault" [(ngModel)]="isAll"
                (change)="getData()">
              <label class="form-check-label" for="flexSwitchCheckDefault">Show All</label>
            </div>
            <div class="ms-auto d-flex gap-2">
              <app-grid-settings [gridApi]="gridApi" [pageId]="pageId"></app-grid-settings>
              <app-grid-filters [gridApi]="gridApi" [pageId]="pageId"></app-grid-filters>
            </div>
          </div>
        </div>
        <div class="card-body p-0">
          <ag-grid-angular class="ag-theme-quartz no-border" [rowData]="data" [columnDefs]="columnDefs"
            [gridOptions]="gridOptions" style="width: 100%;height: calc(100vh - 300px);">
          </ag-grid-angular>
        </div>
      </div>
    </div>
  </div>
</div>

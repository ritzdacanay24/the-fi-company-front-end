<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>The Fi Company</title>
  <!-- <base href="/velzon/angular/modern/"> -->
  <!-- <base href="/velzon/angular/modern-rtl/"> -->
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2e3230">
</head>

<style>
  .ag-watermark {
    display: none !important;
  }

  .app-loading {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .app-loading .loader-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 180px;
    height: 180px;
  }

  .app-loading .logo {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .app-loading .logo img {
    width: 110px;
    max-width: 70vw;
    height: auto;
  }

  .app-loading .spinner {
    height: 180px;
    width: 180px;
    animation: rotate 2s linear infinite;
    transform-origin: center center;
    position: absolute;
    top: 0;
    left: 0;
  }

  .app-loading .spinner .path {
    stroke-dasharray: 1, 200;
    stroke-dashoffset: 0;
    animation: dash 1.5s ease-in-out infinite;
    stroke-linecap: round;
    stroke: #2271b1;
  }

  @keyframes rotate {
    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes dash {
    0% {
      stroke-dasharray: 1, 200;
      stroke-dashoffset: 0;
    }

    50% {
      stroke-dasharray: 89, 200;
      stroke-dashoffset: -35px;
    }

    100% {
      stroke-dasharray: 89, 200;
      stroke-dashoffset: -124px;
    }
  }
</style>

<body>
  <app-root>
    <div class="app-loading">
      <div class="loader-wrap">
        <div class="logo">
          <img src="assets/images/fi-color.png" alt="The Fi Company logo">
        </div>
        <svg class="spinner" viewBox="25 25 50 50" aria-hidden="true">
          <circle class="path" cx="50" cy="50" r="20" fill="none" stroke-width="1" stroke-miterlimit="10"></circle>
        </svg>
      </div>
    </div>
  </app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>

</html>
